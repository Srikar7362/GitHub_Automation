name: Project Creator Agent

# Runs the Project Creator Agent on a schedule. The agent's own interval
# guard (project_creator_agent.simple_project_interval_days) prevents it
# from creating a project more often than configured, so a frequent cron is
# safe - most runs will be no-ops.
on:
  schedule:
    - cron: "0 9 * * 1" # 09:00 UTC every Monday
  workflow_dispatch:
    inputs:
      language:
        description: "Language for the starter project"
        required: false
        default: "python"

jobs:
  create-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Project Creator Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
        run: python project_creator.py --language "${{ github.event.inputs.language || 'python' }}"
